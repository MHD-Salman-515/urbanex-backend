services:
  - type: web
    name: housing-backend
    env: node
    rootDir: .
    buildCommand: npm install && npm run build:render
    preDeployCommand: npm run prisma:migrate:deploy && npm run prisma:migrate:deploy:urbanex
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: URBANEX_DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        value: https://urbanex-frontend.vercel.app
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_OTP_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_REPLY_TO
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: OAUTH_CALLBACK_BASE
        sync: false
      - key: FRONTEND_OAUTH_REDIRECT
        sync: false
